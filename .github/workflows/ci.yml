name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install locked dependencies without editable imports
        run: uv sync --locked --all-groups --no-editable

      - name: Check lockfile
        run: uv lock --check

      - name: Run repository quality gate
        run: uv run --no-sync prek run --all-files

      - name: Type check
        run: uv run --no-sync pyright

      - name: Test with coverage
        run: uv run --no-sync pytest --cov --cov-report=term-missing

      - name: Verify Certbot discovery
        run: uv run --no-sync certbot plugins --text | grep dns-oraclecloud

      - name: Build distributions
        run: uv build --clear

      - name: Validate distributions
        run: uv run --no-sync twine check dist/*

      - name: Verify Python 3.14 wheel without editable imports
        if: matrix.python-version == '3.14'
        run: ./scripts/verify-python314-wheel.sh
